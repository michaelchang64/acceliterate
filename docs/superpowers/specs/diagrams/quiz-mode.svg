<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 380" font-family="ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, monospace" font-size="13">
  <!-- Background -->
  <rect width="640" height="380" rx="8" fill="#0f172a"/>

  <!-- Outer border -->
  <rect x="20" y="20" width="600" height="340" rx="6" fill="#1e293b" stroke="#334155" stroke-width="2"/>

  <!-- Title -->
  <text x="320" y="55" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">Comprehension Check</text>
  <line x1="100" y1="68" x2="540" y2="68" stroke="#334155" stroke-width="1"/>

  <!-- Question -->
  <text x="60" y="100" fill="#cbd5e1" font-size="13">What was the primary finding of the</text>
  <text x="60" y="120" fill="#cbd5e1" font-size="13">research team's investigation?</text>

  <!-- Options -->
  <rect x="50" y="142" width="540" height="32" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="70" y="163" fill="#94a3b8" font-size="12">A)</text>
  <text x="96" y="163" fill="#94a3b8" font-size="12">The results were inconclusive</text>

  <!-- Selected option -->
  <rect x="50" y="182" width="540" height="32" rx="4" fill="#312e81" stroke="#6366f1" stroke-width="1.5"/>
  <text x="70" y="203" fill="#a5b4fc" font-size="12">B)</text>
  <text x="96" y="203" fill="#e2e8f0" font-size="12" font-weight="bold">The scope was unprecedented</text>
  <text x="556" y="203" text-anchor="end" fill="#6366f1" font-size="12">&#9664;</text>

  <rect x="50" y="222" width="540" height="32" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="70" y="243" fill="#94a3b8" font-size="12">C)</text>
  <text x="96" y="243" fill="#94a3b8" font-size="12">The timeline was extended</text>

  <rect x="50" y="262" width="540" height="32" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="70" y="283" fill="#94a3b8" font-size="12">D)</text>
  <text x="96" y="283" fill="#94a3b8" font-size="12">The funding was insufficient</text>

  <!-- Controls -->
  <line x1="50" y1="310" x2="590" y2="310" stroke="#334155" stroke-width="1"/>

  <text x="60" y="335" fill="#94a3b8" font-size="11">[A-D]</text>
  <text x="108" y="335" fill="#64748b" font-size="11">Select</text>
  <text x="200" y="335" fill="#94a3b8" font-size="11">[Enter]</text>
  <text x="250" y="335" fill="#64748b" font-size="11">Confirm</text>
  <text x="370" y="335" fill="#94a3b8" font-size="11">[S]</text>
  <text x="392" y="335" fill="#64748b" font-size="11">Skip quiz</text>
  <text x="500" y="335" fill="#94a3b8" font-size="11">[Esc]</text>
  <text x="534" y="335" fill="#64748b" font-size="11">Back</text>
</svg>
