<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" font-family="ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, monospace" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
    <marker id="arrow-back" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#6366f1"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="320" rx="8" fill="#0f172a"/>

  <!-- Main Thread Box -->
  <rect x="30" y="40" width="310" height="240" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="185" y="30" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">MAIN THREAD (sync)</text>

  <!-- Main thread steps -->
  <rect x="50" y="60" width="270" height="32" rx="4" fill="#1e3a5f"/>
  <text x="185" y="81" text-anchor="middle" fill="#7dd3fc">poll(tick_duration)</text>

  <rect x="50" y="102" width="270" height="32" rx="4" fill="#1e3a5f"/>
  <text x="185" y="123" text-anchor="middle" fill="#7dd3fc">check keyboard input</text>

  <rect x="50" y="144" width="270" height="32" rx="4" fill="#312e81"/>
  <text x="185" y="165" text-anchor="middle" fill="#a5b4fc">llm_rx.try_recv()</text>

  <rect x="50" y="186" width="270" height="32" rx="4" fill="#1e3a5f"/>
  <text x="185" y="207" text-anchor="middle" fill="#7dd3fc">if Some(quiz) -> show it</text>

  <rect x="50" y="228" width="270" height="32" rx="4" fill="#1e3a5f"/>
  <text x="185" y="249" text-anchor="middle" fill="#7dd3fc">render frame</text>

  <!-- Background Thread Box -->
  <rect x="460" y="40" width="310" height="240" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="615" y="30" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">BACKGROUND THREAD (per quiz)</text>

  <!-- Background thread steps -->
  <rect x="480" y="72" width="270" height="32" rx="4" fill="#3b1764"/>
  <text x="615" y="93" text-anchor="middle" fill="#d8b4fe">provider.generate_quiz()</text>

  <rect x="480" y="118" width="270" height="48" rx="4" fill="#3b1764"/>
  <text x="615" y="139" text-anchor="middle" fill="#d8b4fe">blocking HTTP call</text>
  <text x="615" y="155" text-anchor="middle" fill="#a78bfa" font-size="11">or in-process inference</text>

  <rect x="480" y="180" width="270" height="32" rx="4" fill="#3b1764"/>
  <text x="615" y="201" text-anchor="middle" fill="#d8b4fe">send result via tx</text>

  <!-- Channel arrow -->
  <line x1="460" y1="160" x2="340" y2="160" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow-back)"/>

  <!-- Channel label -->
  <rect x="360" y="145" width="80" height="24" rx="12" fill="#312e81"/>
  <text x="400" y="162" text-anchor="middle" fill="#a5b4fc" font-size="11" font-weight="600">mpsc</text>

  <!-- Footer note -->
  <text x="400" y="305" text-anchor="middle" fill="#64748b" font-size="11">try_recv() is non-blocking: returns None instantly if LLM hasn't responded</text>
</svg>
