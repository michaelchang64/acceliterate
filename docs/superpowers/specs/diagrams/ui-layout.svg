<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" font-family="ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, monospace" font-size="13">
  <!-- Background -->
  <rect width="640" height="480" rx="8" fill="#0f172a"/>

  <!-- Outer border -->
  <rect x="20" y="20" width="600" height="440" rx="6" fill="none" stroke="#334155" stroke-width="2"/>

  <!-- RSVP Display Area -->
  <rect x="20" y="20" width="600" height="160" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="590" y="45" text-anchor="end" fill="#64748b" font-size="10">RSVP Display</text>

  <!-- Redicle markers -->
  <text x="295" y="72" text-anchor="middle" fill="#ef4444" font-size="16">&#9660;</text>

  <!-- Word displayed as one unit, ORP letter (3rd char) highlighted -->
  <!-- The whole word appears at once. Only the ORP letter is colored differently. -->
  <text y="108" font-size="26">
    <tspan x="228" fill="#94a3b8">un</tspan><tspan fill="#ef4444" font-weight="bold">p</tspan><tspan fill="#94a3b8">recedented</tspan>
  </text>
  <!-- Note: display is per-WORD. ORP color is a visual aid, not a separate render step. -->

  <!-- Redicle bottom -->
  <text x="295" y="138" text-anchor="middle" fill="#ef4444" font-size="16">&#9650;</text>

  <!-- Context Panel -->
  <rect x="20" y="180" width="600" height="100" rx="0" fill="#162032" stroke="#334155" stroke-width="1.5"/>
  <text x="590" y="200" text-anchor="end" fill="#64748b" font-size="10">Context Panel [c]</text>

  <text x="40" y="220" fill="#64748b" font-size="12">...the results were</text>
  <text x="188" y="220" fill="#cbd5e1" font-size="12" font-weight="bold"> unprecedented </text>
  <text x="310" y="220" fill="#64748b" font-size="12">in</text>

  <text x="40" y="240" fill="#64748b" font-size="12">scope. The research team published</text>
  <text x="40" y="260" fill="#64748b" font-size="12">their findings in early March...</text>

  <!-- Stats Panel -->
  <rect x="20" y="280" width="600" height="110" rx="0" fill="#1a1e2e" stroke="#334155" stroke-width="1.5"/>
  <text x="590" y="300" text-anchor="end" fill="#64748b" font-size="10">Stats Panel [s]</text>

  <!-- Stats content - left column -->
  <text x="40" y="316" fill="#94a3b8" font-size="12">WPM:</text>
  <text x="85" y="316" fill="#7dd3fc" font-size="12" font-weight="bold">350</text>
  <text x="40" y="336" fill="#94a3b8" font-size="12">Time:</text>
  <text x="85" y="336" fill="#7dd3fc" font-size="12">5:16</text>
  <text x="40" y="356" fill="#94a3b8" font-size="12">Session Avg:</text>
  <text x="132" y="356" fill="#7dd3fc" font-size="12">338 WPM</text>

  <!-- Stats content - right column -->
  <text x="320" y="316" fill="#94a3b8" font-size="12">Words:</text>
  <text x="376" y="316" fill="#7dd3fc" font-size="12">1,842 / 2,970</text>
  <text x="320" y="336" fill="#94a3b8" font-size="12">Remaining:</text>
  <text x="398" y="336" fill="#7dd3fc" font-size="12">3:12</text>

  <!-- Progress bar -->
  <rect x="40" y="366" width="560" height="12" rx="6" fill="#1e293b"/>
  <rect x="40" y="366" width="347" height="12" rx="6" fill="#6366f1"/>
  <text x="320" y="375" text-anchor="middle" fill="#e2e8f0" font-size="9" font-weight="bold">62%</text>

  <!-- Control Hints -->
  <rect x="20" y="390" width="600" height="70" rx="0" fill="#131825" stroke="#334155" stroke-width="1.5"/>
  <text x="590" y="410" text-anchor="end" fill="#64748b" font-size="10">Controls [h]</text>

  <text x="40" y="426" fill="#94a3b8" font-size="11">[Space]</text>
  <text x="100" y="426" fill="#64748b" font-size="11">Play/Pause</text>
  <text x="210" y="426" fill="#94a3b8" font-size="11">[&#8592;/&#8594;]</text>
  <text x="256" y="426" fill="#64748b" font-size="11">&#177;1 sentence</text>
  <text x="380" y="426" fill="#94a3b8" font-size="11">[&#8593;/&#8595;]</text>
  <text x="420" y="426" fill="#64748b" font-size="11">&#177;25 WPM</text>

  <text x="40" y="446" fill="#94a3b8" font-size="11">[Tab]</text>
  <text x="84" y="446" fill="#64748b" font-size="11">Mode</text>
  <text x="210" y="446" fill="#94a3b8" font-size="11">[?]</text>
  <text x="232" y="446" fill="#64748b" font-size="11">Help</text>
  <text x="380" y="446" fill="#94a3b8" font-size="11">[Ctrl+L]</text>
  <text x="440" y="446" fill="#64748b" font-size="11">Logs</text>
</svg>
